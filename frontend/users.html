<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Users - Smart Waste ERP</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

  <aside class="sidebar">
    <div class="brand">Smart Waste ERP</div>

    <div class="nav">
      <a class="nav-all" href="dashboard.html">🏠 Dashboard</a>
      <a class="nav-all" href="map.html">📍 View Live Location</a>

      <a class="nav-admin" href="users.html">👥 Users</a>

      <a class="nav-worker nav-driver nav-admin" href="tasks.html">📋 My Tasks</a>

      <a class="nav-worker nav-driver nav-admin" href="collection.html">🗑️ Collection</a>
      <a class="nav-worker nav-driver nav-admin" href="bins.html">🧺 Bin Status</a>
      <a class="nav-worker nav-driver nav-admin" href="staff_vehicle.html">🚛 Staff & Vehicle</a>

      <a class="nav-recycling nav-admin" href="recycling.html">♻️ Recycling</a>
      <a class="nav-admin" href="finance.html">💰 Finance</a>
      <a class="nav-worker nav-driver nav-recycling nav-admin" href="report.html">📊 Reports</a>

      <a class="nav-admin nav-worker nav-driver" href="complaints.html">📝 Complaints</a>
    </div>

    <button type="button" class="btn red" id="logoutBtnSidebar">Logout</button>
  </aside>

  <main class="main">

    <div class="topbar">
      <div class="topbar-left">
        <h1 id="pageTitle">Users</h1>
        <p class="sub" id="pageSub">Admin can view and update user role/area.</p>
      </div>

      <div class="topbar-right" style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <input
          id="searchUsers"
          placeholder="Search email/role/area..."
          style="max-width:260px;"
        />

        <a href="profile.html" title="My Profile">
          <img
            src="https://cdn-icons-png.flaticon.com/512/847/847969.png"
            class="profile-icon"
            alt="Profile"
            style="cursor:pointer;"
          />
        </a>

        <button type="button" class="btn red" id="logoutBtnTop">Logout</button>
      </div>
    </div>

    <div class="card">
      <h2 style="margin-top:0;">All Users</h2>

      <table class="table">
        <thead>
          <tr>
            <th>Email</th>
            <th>Role</th>
            <th>Area</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersBody"></tbody>
      </table>

      <p class="sub" style="margin-bottom:0;">
        Note: Passwords are not shown here.
      </p>
    </div>

  </main>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="./js/users.js"></script>
</body>
</html>
