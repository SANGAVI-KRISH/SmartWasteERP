<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Smart Waste ERP</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">
  <div class="auth-wrap">
    <div class="auth-card">

      <div class="auth-header">
        <div class="logo">🧾</div>
        <div>
          <h1>Create Account</h1>
          <p class="muted">Choose role • Use email/password • Start using ERP</p>
        </div>
      </div>

      <form id="registerForm" class="auth-grid">
        <label class="field">
          <span>Full Name</span>
          <input id="full_name" name="full_name" placeholder="Enter your Name" required>
        </label>

        <label class="field">
          <span>Role</span>
          <select id="role" name="role" required>
            <option value="">-- Select Role --</option>
            <option value="worker">Worker</option>
            <option value="driver">Driver</option>
            <option value="recycling_manager">Recycling Manager</option>
            <option value="admin">Admin</option>
          </select>
        </label>

        <label class="field">
          <span>Area</span>
          <input id="area" name="area" placeholder="Eg: Peelamedu" required>
        </label>

        <label class="field">
          <span>Email</span>
          <input type="email" id="email" name="email" placeholder="example@domain.com" autocomplete="email" required>
        </label>

        <label class="field">
          <span>Password</span>
          <input type="password" id="password" name="password" placeholder="Create password" autocomplete="new-password" required>
        </label>

        <label class="field">
          <span>Confirm Password</span>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password" autocomplete="new-password" required>
        </label>

        <button type="submit" class="btn primary" id="registerBtn">Create Account</button>

        <p class="muted" style="margin:0;">
          Already registered? <a href="index.html" style="color:#9cc2ff;">Back to Login</a>
        </p>

        <p id="msg" class="error"></p>
      </form>

      <div class="auth-footer muted">© Smart Waste ERP</div>
    </div>
  </div>

  <script type="module" src="./js/register.js"></script>
</body>
</html>
